services:
  kr8bit:
    image: kr8bit:latest
    container_name: kr8bit
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LIBRARY_ROOT: /games
      CACHE_DIR: /data/cache
      DB_PATH: /data/kr8bit.db
      DATABASE_URL: file:/data/kr8bit.db
      PORT: "8080"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
    volumes:
      - /path/to/your/games:/games:ro
      - ./kr8bit-data:/data