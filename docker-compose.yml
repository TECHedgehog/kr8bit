services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./downloads:/downloads:ro
      - ./library:/library
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/kr8bit.db
      - SCRAPER_BASE_URL=https://fitgirl-repacks.site
      - SCRAPER_POSTS_PER_PAGE=100
      - SCRAPER_DELAY_SECONDS=1.0
      - SCRAPE_INTERVAL_HOURS=6
      - GAME_CATEGORY_IDS=[5,42,43,319]
      - QBITTORRENT_HOST=http://qbittorrent:8090
      - QBITTORRENT_USER=admin
      - QBITTORRENT_PASS=adminadmin
      - QBIT_SYNC_INTERVAL_SECONDS=30
      - ENRICHMENT_ENABLED=true
      - STEAM_MATCH_THRESHOLD=0.7
      - STEAM_APP_LIST_CACHE_HOURS=24
      - ENRICHMENT_BATCH_SIZE=50
      - ENRICHMENT_DELAY_SECONDS=2.0
      - LIBRARY_PATH=/library
      - DOWNLOADS_PATH=/downloads
      - LIBRARY_SCAN_INTERVAL_HOURS=0
      - TWITCH_CLIENT_ID=d0lqltx6clt0sha4zklpivfy9fciyp
      - TWITCH_CLIENT_SECRET=it7279ip16rf58u9mksei23tzrv1p8
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8090
      - DOCKER_MODS=ghcr.io/gabe565/docker-mod-qbittorrent-enable-xss:latest
    volumes:
      - ./qbittorrent_config:/config
      - ./downloads:/downloads
    ports:
      - "8090:8090"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped