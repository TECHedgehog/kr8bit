<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="crispEdges">
  <title>kr8bit app icon</title>

  <!-- Rounded square dark background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="#121218"/>

  <!-- ══ All coordinates scaled 2.56× from the 400×440 mark, then shifted
         to sit centered: mark fits in ~400×440, scaled ~2× → 800×880
         We use a group transform: scale(2) translate(112, 32)
  ══ -->
  <g transform="translate(112,32) scale(2)">

