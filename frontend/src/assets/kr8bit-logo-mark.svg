<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" shape-rendering="crispEdges">
  <title>kr8bit</title>
  <defs>
    <!-- "8" shape used as a clip mask on the crate face -->
    <!-- Two rounded-rect holes = digit 8 -->
  </defs>

  <!-- ══════════════════════════════════════════
       CRATE — built from layered rectangles
       Colors:
         #4F2ED0  crate face (primary purple)
         #3B22A8  mid shadow / panels
         #2A1870  dark shadow / corner bolts
         #6B48E8  highlight top edge
  ══════════════════════════════════════════ -->

  <!-- ── Crate bottom shadow (gives depth) ── -->
  <rect x="20" y="418" width="360" height="12" rx="4" fill="#1a0e50"/>

  <!-- ── Crate back / top surface (visible above side panels) ── -->
  <!-- This is the top face showing above the front -->
  <rect x="20" y="155" width="360" height="20" fill="#3B22A8"/>

  <!-- ── LEFT side panel (darker purple, slight 3-D) ── -->
  <rect x="20" y="155" width="44" height="270" fill="#3B22A8"/>
  <!-- darker inner edge -->
  <rect x="20" y="155" width="8"  height="270" fill="#2A1870"/>

  <!-- ── RIGHT side panel ── -->
  <rect x="336" y="155" width="44" height="270" fill="#3B22A8"/>
  <rect x="372" y="155" width="8"  height="270" fill="#2A1870"/>

  <!-- ── BOTTOM edge ── -->
  <rect x="20" y="405" width="360" height="20" fill="#3B22A8"/>
  <rect x="20" y="415" width="360" height="8"  fill="#2A1870"/>

  <!-- ── MAIN front face ── -->
  <rect x="64" y="155" width="272" height="250" fill="#4F2ED0"/>

  <!-- ── TOP LIP (above crate front, wraps cartridge) ── -->
  <rect x="20" y="148" width="360" height="16" fill="#3B22A8"/>
  <!-- highlight on very top of lip -->
  <rect x="20" y="148" width="360" height="4"  fill="#6B48E8"/>

  <!-- ── CORNER BOLTS / RIVETS ── -->
  <!-- Top-left -->
  <rect x="24"  y="152" width="16" height="16" fill="#2A1870"/>
  <rect x="27"  y="155" width="10" height="10" fill="#1a0e50"/>
  <!-- Top-right -->
  <rect x="360" y="152" width="16" height="16" fill="#2A1870"/>
  <rect x="363" y="155" width="10" height="10" fill="#1a0e50"/>
  <!-- Bottom-left -->
  <rect x="24"  y="398" width="16" height="16" fill="#2A1870"/>
  <rect x="27"  y="401" width="10" height="10" fill="#1a0e50"/>
  <!-- Bottom-right -->
  <rect x="360" y="398" width="16" height="16" fill="#2A1870"/>
  <rect x="363" y="401" width="10" height="10" fill="#1a0e50"/>

  <!-- ── HORIZONTAL WOOD SLATS on side panels ── -->
  <!-- Left panel slats -->
  <rect x="28" y="200" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="230" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="260" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="290" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="320" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="350" width="36" height="4" fill="#2A1870"/>
  <rect x="28" y="380" width="36" height="4" fill="#2A1870"/>
  <!-- Right panel slats -->
  <rect x="336" y="200" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="230" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="260" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="290" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="320" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="350" width="36" height="4" fill="#2A1870"/>
  <rect x="336" y="380" width="36" height="4" fill="#2A1870"/>

  <!-- ══════════════════════════════════════════
       DIGIT "8" — two dark cutouts on the crate face
       Top hole:    y=170  h=90
       Middle bar:  y=264  h=22  (part of face colour = purple)
       Bottom hole: y=286  h=100
       Left margin from face: 84 → x=84, width=232
  ══════════════════════════════════════════ -->

  <!-- Top hole of 8 -->
  <rect x="84"  y="170" width="232" height="90"  fill="#121218" rx="8"/>
  <!-- Bottom hole of 8 -->
  <rect x="84"  y="290" width="232" height="100" fill="#121218" rx="8"/>

  <!-- Pixel corner accents (give the 8 a pixel-art feel) -->
  <!-- Top hole corners -->
  <rect x="84"  y="170" width="12" height="12" fill="#3B22A8"/>
  <rect x="304" y="170" width="12" height="12" fill="#3B22A8"/>
  <rect x="84"  y="248" width="12" height="12" fill="#3B22A8"/>
  <rect x="304" y="248" width="12" height="12" fill="#3B22A8"/>
  <!-- Bottom hole corners -->
  <rect x="84"  y="290" width="12" height="12" fill="#3B22A8"/>
  <rect x="304" y="290" width="12" height="12" fill="#3B22A8"/>
  <rect x="84"  y="378" width="12" height="12" fill="#3B22A8"/>
  <rect x="304" y="378" width="12" height="12" fill="#3B22A8"/>

  <!-- Subtle inner glow / depth on holes -->
  <rect x="84"  y="170" width="232" height="3" fill="#0a0a14"/>
  <rect x="84"  y="290" width="232" height="3" fill="#0a0a14"/>

  <!-- ══════════════════════════════════════════
       GAME CARTRIDGE — dark housing, centered
       x=140  y=0  width=120  height=172
       Overlaps crate top; crate top lip covers the connector
  ══════════════════════════════════════════ -->

  <!-- Cartridge outer body -->
  <rect x="140" y="4"   width="120" height="168" rx="4" fill="#2C2C3A"/>
  <!-- Cartridge body highlight (left edge) -->
  <rect x="140" y="4"   width="4"   height="168" fill="#3C3C4E"/>
  <!-- Cartridge body shadow (right edge + bottom) -->
  <rect x="256" y="4"   width="4"   height="168" fill="#1C1C26"/>
  <rect x="140" y="168" width="120" height="4"   fill="#1C1C26"/>

  <!-- Connector teeth at bottom of cartridge -->
  <rect x="148" y="156" width="16" height="16" fill="#121218"/>
  <rect x="172" y="156" width="16" height="16" fill="#121218"/>
  <rect x="196" y="156" width="16" height="16" fill="#121218"/>
  <rect x="220" y="156" width="16" height="16" fill="#121218"/>
  <rect x="244" y="156" width="16" height="16" fill="#121218"/>

  <!-- Label area (white-ish inset) -->
  <rect x="148" y="12"  width="104" height="136" rx="2" fill="#E8E8F0"/>
  <!-- Label inner shadow top -->
  <rect x="148" y="12"  width="104" height="3"   fill="#C8C8D8"/>
  <!-- Label inner shadow left -->
  <rect x="148" y="12"  width="3"   height="136" fill="#C8C8D8"/>

  <!-- ── SPACE INVADER sprite on label (pixel art, green) ──
       Grid: 11×8 pixels, each pixel = 8×8px
       Centered in label 104×136: sprite ~88×64, offset x=160 y=44
       Classic Space Invader Type-B (medium alien) pixel map:
       Row 0:  ..X.....X..
       Row 1:  ...X...X...
       Row 2:  ..XXXXXXX..
       Row 3:  .XX.XXX.XX.
       Row 4:  XXXXXXXXXXX
       Row 5:  X.XXXXXXX.X
       Row 6:  X.X.....X.X
       Row 7:  ...XX.XX...
  ── -->
  <!-- px=8, origin x=156 y=36 -->
  <!-- Row 0 -->
  <rect x="172" y="36"  width="8" height="8" fill="#39FF6A"/>
  <rect x="212" y="36"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 1 -->
  <rect x="180" y="44"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="44"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 2 -->
  <rect x="172" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="180" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="188" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="196" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="212" y="52"  width="8" height="8" fill="#39FF6A"/>
  <rect x="220" y="52"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 3 -->
  <rect x="164" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="172" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="188" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="196" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="220" y="60"  width="8" height="8" fill="#39FF6A"/>
  <rect x="228" y="60"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 4 -->
  <rect x="156" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="164" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="172" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="180" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="188" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="196" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="212" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="220" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="228" y="68"  width="8" height="8" fill="#39FF6A"/>
  <rect x="236" y="68"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 5 -->
  <rect x="156" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="172" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="180" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="188" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="196" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="212" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="220" y="76"  width="8" height="8" fill="#39FF6A"/>
  <rect x="236" y="76"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 6 -->
  <rect x="156" y="84"  width="8" height="8" fill="#39FF6A"/>
  <rect x="172" y="84"  width="8" height="8" fill="#39FF6A"/>
  <rect x="236" y="84"  width="8" height="8" fill="#39FF6A"/>
  <!-- Row 7 -->
  <rect x="180" y="92"  width="8" height="8" fill="#39FF6A"/>
  <rect x="188" y="92"  width="8" height="8" fill="#39FF6A"/>
  <rect x="204" y="92"  width="8" height="8" fill="#39FF6A"/>
  <rect x="212" y="92"  width="8" height="8" fill="#39FF6A"/>

  <!-- Label border line -->
  <rect x="148" y="108" width="104" height="2"  fill="#C8C8D8"/>
  <!-- Label text area below sprite -->
  <rect x="156" y="114" width="88"  height="28" rx="2" fill="#D0D0E0"/>
</svg>
